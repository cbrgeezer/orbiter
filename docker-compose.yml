services:
  postgres:
    image: postgres:16
    container_name: orbiter-postgres
    environment:
      POSTGRES_DB: orbiter
      POSTGRES_USER: orbiter
      POSTGRES_PASSWORD: orbiter
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orbiter -d orbiter"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: orbiter-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ORBITER_ROLE: api
      ORBITER_DB: postgresql://orbiter:orbiter@postgres:5432/orbiter
      ORBITER_QUEUE_BACKEND: store
      ORBITER_API_KEY: ${ORBITER_API_KEY:-orbiter-demo-key}

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: orbiter-scheduler
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ORBITER_ROLE: scheduler
      ORBITER_DB: postgresql://orbiter:orbiter@postgres:5432/orbiter
      ORBITER_QUEUE_BACKEND: store
      ORBITER_POLL_INTERVAL: 0.5

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: orbiter-worker
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ORBITER_ROLE: worker
      ORBITER_DB: postgresql://orbiter:orbiter@postgres:5432/orbiter
      ORBITER_QUEUE_BACKEND: store
      ORBITER_CONCURRENCY: 4

  proxy:
    image: caddy:2
    container_name: orbiter-proxy
    depends_on:
      api:
        condition: service_started
    ports:
      - "8000:80"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro

volumes:
  postgres_data:
