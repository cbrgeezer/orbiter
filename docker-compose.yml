services:
  postgres:
    image: postgres:16
    container_name: orbiter-postgres
    environment:
      POSTGRES_DB: orbiter
      POSTGRES_USER: orbiter
      POSTGRES_PASSWORD: orbiter
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orbiter -d orbiter"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: orbiter-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ORBITER_API_KEY: ${ORBITER_API_KEY:-orbiter-demo-key}
    ports:
      - "8000:8000"
    command:
      [
        "orbiter",
        "serve-api",
        "examples/example_dag.py",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--db",
        "postgresql://orbiter:orbiter@postgres:5432/orbiter",
        "--queue-backend",
        "store"
      ]

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: orbiter-scheduler
    depends_on:
      postgres:
        condition: service_healthy
    command:
      [
        "orbiter",
        "run-scheduler",
        "examples/example_dag.py",
        "--db",
        "postgresql://orbiter:orbiter@postgres:5432/orbiter",
        "--queue-backend",
        "store",
        "--poll-interval",
        "0.5"
      ]

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: orbiter-worker
    depends_on:
      postgres:
        condition: service_healthy
    command:
      [
        "orbiter",
        "run-worker",
        "examples/example_dag.py",
        "--db",
        "postgresql://orbiter:orbiter@postgres:5432/orbiter",
        "--queue-backend",
        "store",
        "--concurrency",
        "4"
      ]

volumes:
  postgres_data:
